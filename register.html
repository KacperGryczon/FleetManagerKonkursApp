<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>FleetManager</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="register.js" defer></script>
    <link rel="stylesheet" href="style.css" />
    <script src="https://kit.fontawesome.com/1017934682.js" crossorigin="anonymous"></script>
    <link rel="icon" type="image/png" href="/image/logo.png" />
  </head>

  <body class="register">
    <div class="icon-box">
      <img src="/image/logo.png" alt="logo" />
    </div>
    <h2>Utwórz konto</h2>
    <p>Rozpocznij zarządanie swoją flotą</p>
    <p id="register_error"></p>

    <div class="register-box">
      <p class="input-label">Email</p>
      <input id="registerEmail" />

      <p class="input-label">Hasło</p>
      <input id="registerPassword" type="password" />

      <p class="input-label">Powtórz hasło</p>
      <input id="confirmed_password" type="password" />

      <button onclick="register()">Utwórz konto</button>

      <div class="login-register">
        <p>Masz już konto?</p>
        <a href="index.html">Zaloguj się</a>
      </div>
    </div>
  </body>
</html>
